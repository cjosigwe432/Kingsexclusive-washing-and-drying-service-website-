<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <script src="https://unpkg.com/parse/dist/parse.min.js"></script>
</head>
<body>

<h2>Signup</h2>
<input id="su_username" placeholder="Username"><br><br>
<input id="su_email" placeholder="Email"><br><br>
<input id="su_password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Sign Up</button>

<hr>

<h2>Login</h2>
<input id="li_username" placeholder="Username"><br><br>
<input id="li_password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<hr>

<h2>Dashboard</h2>
<button onclick="getUser()">Get Current User</button>
<p id="output"></p>

<script>

// 🔥 PUT YOUR KEYS HERE
Parse.initialize(" vxeZC8luoDFeP22Yf8ns15C0WXjrL8XekJ8cD6dQ", 
  " p6Z1LnLBL3GC2lkEenc1bObzb8a2ySYqioplrt1k");
Parse.serverURL = " https://parseapi.back4app.com";

// SIGNUP
function signup() {
  const user = new Parse.User();

  user.set("username", document.getElementById("su_username").value);
  user.set("password", document.getElementById("su_password").value);
  user.set("email", document.getElementById("su_email").value);

  user.signUp()
  .then(() => alert("Signup successful"))
  .catch(err => alert(err.message));
}

// LOGIN
function login() {
  const username = document.getElementById("li_username").value;
  const password = document.getElementById("li_password").value;

  Parse.User.logIn(username, password)
  .then(() => alert("Login successful"))
  .catch(err => alert(err.message));
}

// GET USER
function getUser() {
  const user = Parse.User.current();

  if (user) {
    document.getElementById("output").innerText =
      "Logged in as: " + user.get("username");
  } else {
    document.getElementById("output").innerText =
      "No user logged in";
  }
}

</script>

</body>
</html>
