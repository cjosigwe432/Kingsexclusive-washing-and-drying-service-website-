<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProBiz Premium</title>
<link rel="stylesheet" href="style.css">
    
    <!-- Add firebase here -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>ProBiz</h2>
        <ul>
            <li onclick="showPage('dashboard')">Dashboard</li>
            <li onclick="showPage('profile')">Profile</li>
            <li onclick="showPage('settings')">Settings</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <div class="topbar">
            <h3>Dashboard</h3>
            <button onclick="toggleTheme()">🌗 Toggle</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="page">
            <div class="cards">
                <div class="card">💰 Revenue<br>$12,450</div>
                <div class="card">📊 Sales<br>320</div>
                <div class="card">👥 Users<br>1,200</div>
            </div>
        </div>

        <!-- PROFILE -->
        <div id="profile" class="page hidden">
            <h2>User Profile</h2>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <button>Save</button>
        </div>

        <!-- SETTINGS -->
        <div id="settings" class="page hidden">
            <h2>Settings</h2>
            <p>Coming soon...</p>
        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
